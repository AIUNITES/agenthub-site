<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentHub → AIByJob</title>
  <meta http-equiv="refresh" content="3;url=https://aiunites.github.io/aibyjob-demo/">
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 500px; }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 { font-size: 2rem; margin-bottom: 10px; }
    h1 span { color: #ff3366; }
    p { color: #9ca3af; margin-bottom: 20px; line-height: 1.6; }
    .redirect-msg { 
      background: rgba(255, 51, 102, 0.1);
      border: 1px solid rgba(255, 51, 102, 0.3);
      padding: 16px 24px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .redirect-msg strong { color: #ff3366; }
    a { 
      display: inline-block;
      background: linear-gradient(135deg, #ff3366, #ff6b6b);
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255, 51, 102, 0.3); }
    .loader { 
      width: 40px; height: 40px; 
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #ff3366;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🤖</div>
    <h1>AgentHub is now AI<span>ByJob</span></h1>
    <p>We've consolidated our AI agent platforms into one powerful hub.</p>
    <div class="redirect-msg">
      <strong>Redirecting in 3 seconds...</strong>
    </div>
    <div class="loader"></div>
    <a href="https://aiunites.github.io/aibyjob-demo/">Go to AIByJob Now →</a>
  </div>
</body>
</html>
